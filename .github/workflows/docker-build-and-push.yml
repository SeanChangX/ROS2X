name: Build And Publish Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "docker/**"
      - "scripts/install_ros2_humble.sh"
      - ".github/workflows/docker-build-and-push.yml"
  pull_request:
    paths:
      - "docker/**"
      - "scripts/install_ros2_humble.sh"
      - ".github/workflows/docker-build-and-push.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.ros_distro }}-${{ matrix.flavor_tag }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ros_distro: humble
            ros_install_type: ros-base
            flavor_tag: base
            install_tag: ros-base
          - ros_distro: humble
            ros_install_type: desktop
            flavor_tag: desktop
            install_tag: desktop
          - ros_distro: humble
            ros_install_type: development
            flavor_tag: dev
            install_tag: development
          - ros_distro: iron
            ros_install_type: ros-base
            flavor_tag: base
            install_tag: ros-base
          - ros_distro: iron
            ros_install_type: desktop
            flavor_tag: desktop
            install_tag: desktop
          - ros_distro: iron
            ros_install_type: development
            flavor_tag: dev
            install_tag: development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=${{ matrix.ros_distro }}-${{ matrix.flavor_tag }}-
            type=raw,value=${{ matrix.ros_distro }}-${{ matrix.flavor_tag }},enable={{is_default_branch}}
            type=raw,value=${{ matrix.ros_distro }}-${{ matrix.install_tag }},enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ matrix.ros_distro == 'humble' && matrix.ros_install_type == 'ros-base' && github.ref == 'refs/heads/main' }}

      - name: Build and (optionally) push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            ROS_DISTRO=${{ matrix.ros_distro }}
            ROS_INSTALL_TYPE=${{ matrix.ros_install_type }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.ros_distro }}-${{ matrix.flavor_tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.ros_distro }}-${{ matrix.flavor_tag }}
